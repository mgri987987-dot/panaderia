<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panadería El Horno Dorado</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>
<body class="font-sans">

  <!-- Hero -->
  <section class="h-screen flex items-center text-white relative">
    <img src="https://picsum.photos/id/1015/2000/1200" class="absolute inset-0 w-full h-full object-cover" alt="Panadería">
    <div class="absolute inset-0 bg-black/60"></div>
    <div class="max-w-6xl mx-auto px-6 text-center relative z-10">
      <h1 class="text-6xl md:text-7xl font-bold mb-4">El Horno Dorado</h1>
      <p class="text-3xl mb-8">Pan artesanal con amor</p>
      <a href="#productos" class="bg-amber-600 hover:bg-amber-700 px-8 py-4 rounded-full text-lg font-semibold inline-block">
        Ver nuestros productos
      </a>
    </div>
  </section>

  <!-- Productos -->
  <section id="productos" class="py-20 bg-amber-50">
    <div class="max-w-6xl mx-auto px-6">
      <h2 class="text-4xl font-bold text-center mb-12">Nuestros Productos</h2>
      <div class="grid md:grid-cols-3 gap-8">

        <div class="bg-white rounded-2xl overflow-hidden shadow">
          <img src="https://picsum.photos/id/292/600/400" class="w-full h-64 object-cover">
          <div class="p-6">
            <h3 class="font-bold text-xl">Pan de Masa Madre</h3>
            <p class="text-amber-600">$2.800</p>
          </div>
        </div>

        <div class="bg-white rounded-2xl overflow-hidden shadow">
          <img src="https://picsum.photos/id/431/600/400" class="w-full h-64 object-cover">
          <div class="p-6">
            <h3 class="font-bold text-xl">Croissants de Mantequilla</h3>
            <p class="text-amber-600">$1.900</p>
          </div>
        </div>

        <div class="bg-white rounded-2xl overflow-hidden shadow">
          <img src="https://picsum.photos/id/1060/600/400" class="w-full h-64 object-cover">
          <div class="p-6">
            <h3 class="font-bold text-xl">Pastel de Chocolate</h3>
            <p class="text-amber-600">$19.500</p>
          </div>
        </div>

      </div>
    </div>
  </section>

</body>
</html>
